<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Paralelo App — UTESA</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #1A1A2E; color: #fff; min-height: 100vh; }
    header { background: #16213E; padding: 18px 32px; display: flex; align-items: center; gap: 16px; border-bottom: 2px solid #7C6FCD; }
    header h1 { font-size: 1.4rem; color: #7C6FCD; }
    header span { font-size: 0.85rem; color: #aaa; }
    .container { max-width: 960px; margin: 40px auto; padding: 0 24px; }
    .card { background: #16213E; border-radius: 12px; padding: 28px; margin-bottom: 24px; border: 1px solid #2a2a4a; }
    .card h2 { font-size: 1.1rem; color: #7C6FCD; margin-bottom: 16px; }
    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 0.85rem; color: #aaa; margin-bottom: 6px; }
    input, textarea, select {
      width: 100%; padding: 10px 14px; border-radius: 8px;
      background: #0F3460; border: 1px solid #2a2a5a; color: #fff;
      font-size: 0.95rem; outline: none;
    }
    textarea { resize: vertical; min-height: 80px; }
    button {
      background: #7C6FCD; color: #fff; border: none; border-radius: 8px;
      padding: 11px 24px; font-size: 0.95rem; cursor: pointer; margin-top: 8px;
      transition: background 0.2s;
    }
    button:hover { background: #5a4fa0; }
    button.danger { background: #c0392b; }
    button.danger:hover { background: #922b21; }
    .alert { padding: 12px 16px; border-radius: 8px; margin-top: 14px; font-size: 0.9rem; }
    .alert.success { background: #1e4d2b; border: 1px solid #27ae60; }
    .alert.error   { background: #4d1e1e; border: 1px solid #c0392b; }
    .token-box { background: #0F3460; border-radius: 8px; padding: 10px 14px; font-size: 0.8rem; color: #7C6FCD; word-break: break-all; margin-top: 10px; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th { background: #0F3460; padding: 10px 14px; text-align: left; font-size: 0.85rem; color: #aaa; }
    td { padding: 10px 14px; border-bottom: 1px solid #2a2a4a; font-size: 0.9rem; }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; }
    .badge.admin { background: #6e2f00; color: #f39c12; }
    .badge.usuario { background: #003040; color: #1abc9c; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media(max-width:600px) { .grid-2 { grid-template-columns: 1fr; } }
    .status { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: #aaa; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: #27ae60; }
    .dot.red { background: #c0392b; }
  </style>
</head>
<body>

<header>
  <div>
    <h1> Paralelo API — UTESA</h1>
    <span>Arquitectura Serverless · Docker · Kubernetes</span>
  </div>
  <div style="margin-left:auto" id="statusBar">
    <div class="status"><div class="dot" id="dotStatus"></div><span id="txtStatus">Verificando API...</span></div>
  </div>
</header>

<div class="container">

  <!-- LOGIN -->
  <div class="card" id="cardLogin">
    <h2>🔐 Autenticación JWT</h2>
    <div class="grid-2">
      <div class="form-group">
        <label>Email</label>
        <input id="loginEmail" type="email" placeholder="usuario@email.com"/>
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input id="loginPass" type="password" placeholder="••••••"/>
      </div>
    </div>
    <button onclick="login()">Iniciar sesión</button>
    <button onclick="showRegister()" style="background:#2E5090;margin-left:8px">Registrarse</button>
    <div id="loginMsg"></div>
    <div id="tokenDisplay" style="display:none">
      <div class="token-box" id="tokenBox"></div>
    </div>
  </div>

  <!-- REGISTER (oculto por defecto) -->
  <div class="card" id="cardRegister" style="display:none">
    <h2>📝 Registro de Usuario</h2>
    <div class="grid-2">
      <div class="form-group">
        <label>Nombre</label>
        <input id="regNombre" placeholder="Nombre completo"/>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input id="regEmail" type="email" placeholder="email@ejemplo.com"/>
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input id="regPass" type="password" placeholder="••••••"/>
      </div>
      <div class="form-group">
        <label>Rol</label>
        <select id="regRol">
          <option value="usuario">usuario</option>
          <option value="admin">admin</option>
        </select>
      </div>
    </div>
    <button onclick="register()">Crear cuenta</button>
    <button onclick="hideRegister()" style="background:#444;margin-left:8px">Cancelar</button>
    <div id="registerMsg"></div>
  </div>

  <!-- USUARIOS -->
  <div class="card" id="cardUsuarios" style="display:none">
    <h2>👥 CRUD de Usuarios</h2>
    <button onclick="loadUsuarios()">🔄 Recargar</button>
    <div id="tablaUsuarios" style="margin-top:16px"></div>
  </div>

  <!-- NOTIFICACIÓN -->
  <div class="card" id="cardNotif" style="display:none">
    <h2>📧 Enviar Notificación (SNS)</h2>
    <div class="form-group">
      <label>Email destino</label>
      <input id="notifEmail" placeholder="destino@gmail.com"/>
    </div>
    <div class="form-group">
      <label>Asunto</label>
      <input id="notifAsunto" placeholder="Asunto del mensaje"/>
    </div>
    <div class="form-group">
      <label>Mensaje</label>
      <textarea id="notifMsg" placeholder="Escribe el mensaje aquí..."></textarea>
    </div>
    <button onclick="sendNotif()">Enviar notificación</button>
    <div id="notifResult"></div>
  </div>

</div>

<script>
  // ── CONFIGURACIÓN ──
  // En Kubernetes esta URL viene del Service del backend
  const API = 'http://localhost:8080/api';

  let token = localStorage.getItem('jwt') || '';

  // ── VERIFICAR API ──
  async function checkAPI() {
    try {
      const r = await fetch(`${API}/auth/login`, { method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({email:'x',password:'x'}) });
      document.getElementById('dotStatus').className = 'dot';
      document.getElementById('txtStatus').textContent = 'API conectada ✓';
    } catch {
      document.getElementById('dotStatus').className = 'dot red';
      document.getElementById('txtStatus').textContent = 'API no disponible';
    }
  }

  // ── AUTH ──
  async function login() {
    const email = document.getElementById('loginEmail').value;
    const pass  = document.getElementById('loginPass').value;
    const res   = await fetch(`${API}/auth/login`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email, password: pass})
    });
    const data = await res.json();
    if (data.token) {
      token = data.token;
      localStorage.setItem('jwt', token);
      document.getElementById('tokenDisplay').style.display = 'block';
      document.getElementById('tokenBox').textContent = 'JWT: ' + token.substring(0,60) + '...';
      document.getElementById('loginMsg').innerHTML = '<div class="alert success">✅ Login exitoso</div>';
      document.getElementById('cardUsuarios').style.display = 'block';
      document.getElementById('cardNotif').style.display = 'block';
      loadUsuarios();
    } else {
      document.getElementById('loginMsg').innerHTML = `<div class="alert error">❌ ${data.error || 'Error'}</div>`;
    }
  }

  async function register() {
    const nombre = document.getElementById('regNombre').value;
    const email  = document.getElementById('regEmail').value;
    const pass   = document.getElementById('regPass').value;
    const rol    = document.getElementById('regRol').value;
    const res    = await fetch(`${API}/auth/register`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({nombre, email, password: pass, rol})
    });
    const data = await res.json();
    if (data.data) {
      document.getElementById('registerMsg').innerHTML = '<div class="alert success">✅ Usuario creado. Inicia sesión.</div>';
    } else {
      document.getElementById('registerMsg').innerHTML = `<div class="alert error">❌ ${data.error}</div>`;
    }
  }

  function showRegister() { document.getElementById('cardRegister').style.display = 'block'; }
  function hideRegister() { document.getElementById('cardRegister').style.display = 'none'; }

  // ── USUARIOS ──
  async function loadUsuarios() {
    const res  = await fetch(`${API}/usuarios`, { headers: { Authorization: `Bearer ${token}` } });
    const data = await res.json();
    if (!data.data) return;
    const rows = data.data.map(u => `
      <tr>
        <td>${u.id}</td>
        <td>${u.nombre}</td>
        <td>${u.email}</td>
        <td><span class="badge ${u.rol}">${u.rol}</span></td>
        <td><button class="danger" onclick="deleteUser(${u.id})">Eliminar</button></td>
      </tr>`).join('');
    document.getElementById('tablaUsuarios').innerHTML = `
      <table>
        <thead><tr><th>ID</th><th>Nombre</th><th>Email</th><th>Rol</th><th>Acción</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  async function deleteUser(id) {
    if (!confirm('¿Eliminar este usuario?')) return;
    await fetch(`${API}/usuarios/${id}`, { method: 'DELETE', headers: { Authorization: `Bearer ${token}` } });
    loadUsuarios();
  }

  // ── NOTIFICACIONES ──
  async function sendNotif() {
    const email   = document.getElementById('notifEmail').value;
    const subject = document.getElementById('notifAsunto').value;
    const message = document.getElementById('notifMsg').value;
    const res     = await fetch(`${API}/notifications/send`, {
      method: 'POST', headers: {'Content-Type':'application/json', Authorization: `Bearer ${token}`},
      body: JSON.stringify({email, subject, message})
    });
    const data = await res.json();
    document.getElementById('notifResult').innerHTML = data.message_id
      ? `<div class="alert success">✅ Notificación enviada. ID: ${data.message_id}</div>`
      : `<div class="alert error">❌ ${data.error}</div>`;
  }

  checkAPI();
</script>
</body>
</html>
