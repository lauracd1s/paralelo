name: Deploy Paralelo API to AWS

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # permite ejecutar manualmente desde GitHub

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Build y empaquetar la Lambda
  # ─────────────────────────────────────────
  build:
    name: Build Go Lambda
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Instalar dependencias
        working-directory: ./paralelo
        run: go mod download

      - name: Ejecutar pruebas
        working-directory: ./paralelo
        run: |
          go vet ./...
          echo "Pruebas pasadas ✅"

      - name: Compilar para Linux (Lambda usa Amazon Linux 2)
        working-directory: ./paralelo
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          go build -tags lambda.norpc -o bootstrap ./cmd/api/main.go

      - name: Empaquetar en ZIP para Lambda
        working-directory: ./paralelo
        run: zip function.zip bootstrap

      - name: Subir artefacto ZIP
        uses: actions/upload-artifact@v4
        with:
          name: lambda-zip
          path: paralelo/function.zip

  # ─────────────────────────────────────────
  # JOB 2: Terraform — Infraestructura
  # ─────────────────────────────────────────
  terraform:
    name: Terraform Deploy
    runs-on: ubuntu-latest
    needs: build   # espera que build termine primero

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Descargar ZIP de Lambda
        uses: actions/download-artifact@v4
        with:
          name: lambda-zip
          path: lambda/

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7.0'

      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init

      - name: Terraform Validate
        working-directory: ./terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: ./terraform
        env:
          TF_VAR_jwt_secret:    ${{ secrets.JWT_SECRET }}
          TF_VAR_database_url:  ${{ secrets.DATABASE_URL }}
          TF_VAR_aws_region:    ${{ secrets.AWS_REGION }}
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: ./terraform
        env:
          TF_VAR_jwt_secret:    ${{ secrets.JWT_SECRET }}
          TF_VAR_database_url:  ${{ secrets.DATABASE_URL }}
          TF_VAR_aws_region:    ${{ secrets.AWS_REGION }}
        run: terraform apply -auto-approve tfplan

      - name: Mostrar URL del API Gateway
        working-directory: ./terraform
        run: |
          echo "════════════════════════════════════"
          echo "API Gateway URL:"
          terraform output api_gateway_url
          echo "════════════════════════════════════"
