name: Deploy Paralelo API to AWS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Build Lambda principal
  # ─────────────────────────────────────────
  build:
    name: Build Go Lambda
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Instalar dependencias Lambda principal
        working-directory: ./paralelo
        run: go mod download

      - name: Ejecutar pruebas
        working-directory: ./paralelo
        run: |
          go vet ./...
          echo "Pruebas pasadas ✅"

      - name: Compilar Lambda principal
        working-directory: ./paralelo
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 0
        run: go build -tags lambda.norpc -o bootstrap ./cmd/api/main.go

      - name: Empaquetar Lambda principal
        working-directory: ./paralelo
        run: zip function.zip bootstrap

      - name: Compilar notification-lambda
        working-directory: ./notification_lambda
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          go mod download
          go build -tags lambda.norpc -o bootstrap ./main.go

      - name: Empaquetar notification-lambda
        working-directory: ./notification_lambda
        run: zip notification.zip bootstrap

      - name: Subir artefactos
        uses: actions/upload-artifact@v4
        with:
          name: lambda-zips
          path: |
            paralelo/function.zip
            notification_lambda/notification.zip

  # ─────────────────────────────────────────
  # JOB 2: Terraform
  # ─────────────────────────────────────────
  terraform:
    name: Terraform Deploy
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Descargar ZIPs
        uses: actions/download-artifact@v4
        with:
          name: lambda-zips
          path: lambda/

      - name: Mover ZIPs al lugar correcto
        run: |
          mv lambda/paralelo/function.zip lambda/function.zip
          mv lambda/notification_lambda/notification.zip lambda/notification.zip

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7.0'

      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init

      - name: Terraform Validate
        working-directory: ./terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: ./terraform
        env:
          TF_VAR_jwt_secret:    ${{ secrets.JWT_SECRET }}
          TF_VAR_database_url:  ${{ secrets.DATABASE_URL }}
          TF_VAR_aws_region:    ${{ secrets.AWS_REGION }}
          TF_VAR_ses_sender_email: ${{ secrets.SES_SENDER_EMAIL }}
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: ./terraform
        env:
          TF_VAR_jwt_secret:    ${{ secrets.JWT_SECRET }}
          TF_VAR_database_url:  ${{ secrets.DATABASE_URL }}
          TF_VAR_aws_region:    ${{ secrets.AWS_REGION }}
          TF_VAR_ses_sender_email: ${{ secrets.SES_SENDER_EMAIL }}
        run: terraform apply -auto-approve tfplan

      - name: Mostrar outputs
        working-directory: ./terraform
        run: |
          echo "════════════════════════════════════"
          echo "API Gateway URL:"
          terraform output api_gateway_url
          echo "SNS Topic ARN:"
          terraform output sns_topic_arn
          echo "SQS Queue URL:"
          terraform output sqs_queue_url
          echo "════════════════════════════════════"
