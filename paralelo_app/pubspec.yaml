name: paralelo_app
description: App móvil que consume la API Paralelo - UTESA 10mo cuatrimestre

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP y networking
  http: ^1.2.1

  # Estado (Provider para MVVM)
  provider: ^6.1.2

  # Almacenamiento local del JWT
  shared_preferences: ^2.2.3

  # Selección de imágenes (reemplaza file_picker)
  image_picker: ^1.0.7

  # UI
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
